name: Build Binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BINARY=forks
          if [ "$GOOS" = "windows" ]; then
            BINARY=forks.exe
          fi
          go build -ldflags="-s -w -X github.com/cicbyte/forks/utils.Version=$VERSION" -o $BINARY .
          tar -czf forks_${GOOS}_${GOARCH}.tar.gz $BINARY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: forks_${{ matrix.goos }}_${{ matrix.goarch }}
          path: forks_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz
